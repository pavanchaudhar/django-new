<!DOCTYPE html>
<html>
<head>

<title>All Notes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1 class="text-center text-primary">
All Notes
</h1>

<a href="/" class="btn btn-dark">
Home
</a>

<a href="/add/" class="btn btn-success">
Add Note
</a>

<hr>

{% for note in notes %}

<div class="card mb-3">

<div class="card-body">

<h3>{{ note.title }}</h3>

<p>{{ note.content }}</p>

<p>

<small class="text-muted">

Created :
{{ note.created_at }}

</small>

</p>

<a href="/edit/{{ note.id }}/" class="btn btn-warning">

Edit

</a>

<a href="/delete/{{ note.id }}/" class="btn btn-danger">

Delete

</a>

</div>

</div>

{% empty %}

<div class="alert alert-danger">

No Notes Found

</div>

{% endfor %}

</div>

</body>
</html>
