{% extends 'base.html' %}

{% block title %}
Delete Note
{% endblock %}

{% block content %}

<div class="alert alert-danger">

<h3>Delete Note</h3>

<p>Are you sure you want to delete this note?</p>

<strong>{{ note.title }}</strong>

<form method="POST" class="mt-3">

{% csrf_token %}

<button class="btn btn-danger">
Delete
</button>

<a href="{% url 'note_list' %}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

{% endblock %}
