<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Login</h2>

<form method="POST">

{% csrf_token %}

<input
type="text"
name="username"
placeholder="Username"
class="form-control mb-3"
required>

<input
type="password"
name="password"
placeholder="Password"
class="form-control mb-3"
required>

<button class="btn btn-primary">
Login
</button>

</form>

<br>

<a href="{% url 'register' %}">
Create New Account
</a>

</div>

</body>

</html>
