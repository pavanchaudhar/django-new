<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Notes App{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="{% url 'home' %}">
            📝 Notes App
        </a>

        <div>

            {% if user.is_authenticated %}

            <span class="text-white me-3">
                Welcome, {{ user.username }}
            </span>

            <a href="{% url 'note_list' %}" class="btn btn-outline-light btn-sm">
                Notes
            </a>

            <a href="{% url 'add_note' %}" class="btn btn-success btn-sm">
                Add Note
            </a>

            <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                Logout
            </a>

            {% else %}

            <a href="{% url 'login' %}" class="btn btn-primary btn-sm">
                Login
            </a>

            <a href="{% url 'register' %}" class="btn btn-success btn-sm">
                Register
            </a>

            {% endif %}

        </div>

    </div>
</nav>

<div class="container mt-4">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}

    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
